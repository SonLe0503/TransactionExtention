<!DOCTYPE html>
<html lang="en">

    <title>Transactions Extention</title>
    <link rel="stylesheet" href="../css/popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="title">Login</div>
      <form class="login_form m_t20">
        <input
          id="username"
          class="username f_s15"
          placeholder="Nhập tên"
          required
        />
        <input
          id="password"
          class="password m_t10 f_s15"
          placeholder="Nhập mật khẩu"
          required
        />
        <div class="button_submit">
          <button class="submit m_t10 f_s15" id="login_btn">Đăng nhập</button>
        </div>
      </form>
    </div>
    <script type="module" src="/js/signin.js"></script>
