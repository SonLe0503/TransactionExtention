<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions Extention</title>
    <link rel="stylesheet" href="/css/popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="title">Signup</div>
      <form class="signup_form m_t20">
        <input
          id="email"
          class="email f_s15"
          placeholder="Nhập email"
          required
        />
        <input
          id="username"
          class="username f_s15 m_t10"
          placeholder="Nhập tên"
          required
        />
        <input
          id="password"
          class="password m_t10 f_s15"
          placeholder="Nhập mật khẩu"
          required
        />
        <input
          id="re_password"
          class="password m_t10 f_s15"
          placeholder="Nhập lại mật khẩu"
          required
        />
        <div class="button_submit">
          <button class="submit m_t10 f_s15" id="signup_btn">Đăng kí</button>
        </div>
        <div class="f_s15 m_t10 d_f t_a">
          <div>Quay lại</div>
          &nbsp;
          <div id="btn_back" class="b_p c_lp">Đăng nhập</div>
        </div>
      </form>
    </div>
    <script type="module" src="/js/signup.js"></script>
  </body>
</html>
